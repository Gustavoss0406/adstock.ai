# Pixel Agents Office — Render Deploy
# https://render.com → New Web Service → Connect Git Repo
#
# Root Directory: agent_office
# Build Command:    npm install && cd webview-ui && npm install && cd .. && npm run build
# Start Command:    node dist/cli.mjs --host 0.0.0.0 --port $PORT

services:
  - type: web
    name: pixel-office
    env: node
    plan: free
    rootDir: agent_office
    buildCommand: npm install && cd webview-ui && npm install && cd .. && npm run build
    startCommand: node dist/cli.mjs --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
